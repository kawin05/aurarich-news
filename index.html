<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurarich Daily News</title>
<meta property="og:image" content="hero-thumb.png">
<meta property="og:title" content="Aurarich Daily News">
<meta property="og:description" content="Cosmetics, beauty, Facebook ads & Thailand business news — updated daily">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a0a2e url('bg.png') center/cover fixed no-repeat;
    color: #1a1a1a;
    line-height: 1.6;
    min-height: 100vh;
  }
  .top-bar {
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: white;
    padding: 8px 0;
    text-align: center;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .container {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 20px 40px;
  }
  .card {
    background: rgba(255,255,255,0.88);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 16px;
    padding: 20px 28px;
    margin-top: 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  }
  header {
    text-align: center;
    padding: 28px 0 16px;
    border-bottom: 1px solid rgba(0,0,0,0.08);
  }
  header h1 {
    font-size: 24px;
    background: linear-gradient(135deg, #f5a623, #e9407a, #7b2ff7);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  header h1 span { -webkit-text-fill-color: #7b2ff7; }
  header .date {
    font-size: 13px;
    color: #666;
    margin-top: 4px;
  }
  .news-item {
    padding: 16px 0;
    border-bottom: 1px solid rgba(0,0,0,0.06);
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }
  .news-item:last-of-type { border-bottom: none; }
  .news-thumb {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: #fff;
    margin-top: 2px;
  }
  .news-body { flex: 1; min-width: 0; }
  .news-item .source {
    font-size: 10px;
    color: #e9407a;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    font-weight: 600;
    margin-bottom: 2px;
  }
  .news-item .title {
    font-size: 16px;
    font-weight: 600;
    color: #1a1a1a;
    margin: 2px 0 4px;
    line-height: 1.4;
  }
  .news-item .title a {
    color: #1a1a1a;
    text-decoration: none;
  }
  .news-item .title a:hover { color: #7b2ff7; }
  .news-item .summary {
    font-size: 13px;
    color: #555;
    line-height: 1.5;
  }
  .section-title {
    font-size: 12px;
    color: #7b2ff7;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-weight: 700;
    margin: 20px 0 2px;
    padding-top: 4px;
  }
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #888;
  }
  .empty-state h2 { font-size: 20px; color: #555; margin-bottom: 8px; }
  .empty-state p { font-size: 14px; }
  footer {
    text-align: center;
    padding: 20px 0;
    color: #999;
    font-size: 11px;
    border-top: 1px solid rgba(0,0,0,0.06);
    margin-top: 4px;
  }
  .loading {
    text-align: center;
    padding: 60px 20px;
    color: #888;
  }
  .loading .spinner {
    display: inline-block;
    width: 24px;
    height: 24px;
    border: 3px solid #eee;
    border-top-color: #e9407a;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="top-bar">Aurarich Daily News · Cosmetic & Business Brief</div>
<div class="container">
  <div class="card">
  <header>
    <h1>Aurarich <span>News</span></h1>
    <div class="date" id="date"></div>
  </header>
  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
      <p>Loading today's brief...</p>
    </div>
  </div>
  <footer>
    Updated daily at 8:00 AM
  </footer>
  </div>
</div>
<script>
const today = new Date();
const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
document.getElementById('date').textContent = `${days[today.getDay()]}, ${months[today.getMonth()]} ${today.getDate()}, ${today.getFullYear()}`;

const categoryColors = {
  "Cosmetics & Beauty": ["#e9407a", "💄"],
  "Facebook & Ads": ["#1877F2", "📱"],
  "Thailand Business": ["#7b2ff7", "🇹🇭"],
  "Marketing Tips": ["#f5a623", "💡"]
};

const articles = [
  {cat: "Cosmetics & Beauty", src: "Cosmoprof", title: "Cosmoprof CBE ASEAN 2026 Returns to Bangkok June 24-26 with Record Exhibitors", url: "https://www.cosmoprof.com/en/corporate/cosmoprof-network/cosmoprof-made-exhibitions/cosmoprof-cbe-asean-bangkok/", summary: "The 5th edition of Cosmoprof CBE ASEAN opens June 24-26 at Queen Sirikit National Convention Center, featuring 650+ exhibitors and 2,000+ brands from 21 countries — covering the full beauty supply chain from raw ingredients to finished products in ASEAN's fastest-growing beauty market."},
  {cat: "Cosmetics & Beauty", src: "Thailand PRD", title: "T-Beauty Gains International Recognition as Thailand Targets Top-3 Asian Beauty Status", url: "https://thailand.prd.go.th/en/content/category/detail/id/2078/iid/504526", summary: "Thailand's beauty industry is gaining global recognition with the government's 'T-Beauty: Official Launch' project promoting lotus flower, gotu kola, and turmeric as signature cosmetic ingredients — aiming for top-three Asian beauty industry status as cosmetics trademark registrations surge."},
  {cat: "Cosmetics & Beauty", src: "AP News", title: "FDA Approves First New Sunscreen Ingredient in More Than 25 Years", url: "https://apnews.com/article/sunscreen-fda-bemotrizinol-ingredient-uva-protection-9b9c7e04b418b3c9c1fbaa7ddabade25", summary: "The FDA approved bemotrizinol (BEMT) — the first new sunscreen UV filter in over 25 years — offering broad-spectrum UVA/UVB protection without white cast, approved for adults and children 6 months+, and expected to launch under the brand name Parsol Shield."},
  {cat: "Cosmetics & Beauty", src: "ChemLinked", title: "Thailand Approves 25 Amendments to Cosmetic Ingredient Lists Aligned with ASEAN Directive", url: "https://cosmetic.chemlinked.com/news/cosmetic-news/thailand-approves-amendments-to-cosmetic-ingredient-lists-19-additions-4-revisions-and-2-deletions", summary: "Thailand formally approved 25 modifications to its cosmetic ingredient lists — including 17 new prohibited ingredients, 2 new restricted ingredients, and 2 preservatives removed — aligning domestic regulations with the latest ASEAN Cosmetic Directive updates."},
  {cat: "Facebook & Ads", src: "WABetaInfo", title: "Meta Launches AI Business Agent for WhatsApp, Instagram, and Messenger Globally", url: "https://wabetainfo.com/meta-introduces-ai-business-agent-for-whatsapp-worldwide/", summary: "Meta launched its AI Business Agent globally at Conversations 2026, enabling businesses to automate customer support, qualify leads, and manage conversations 24/7 across WhatsApp, Instagram, and Messenger with customizable interaction modes and human escalation options."},
  {cat: "Facebook & Ads", src: "Meta for Business", title: "Threads Ads Roll Out to All 400M+ Users Globally — New Advertising Channel for Brands", url: "https://www.facebook.com/business/news/ads-on-threads-one-year-in", summary: "Meta is rolling out Threads ads to all 400M+ monthly active users globally, with formats including Image, Video, Carousel, Advantage+ Catalog, and App ads — powered by Meta's AI ad system with brand safety verification from third-party partners."},
  {cat: "Facebook & Ads", src: "WordStream", title: "Top Facebook Ads Trends for 2026: Clean Data, Authentic Creative & Smart AI Targeting", url: "https://www.wordstream.com/blog/2026-facebook-ads-trends", summary: "WordStream's 2026 Facebook Ads guide identifies three winning pillars: clean first-party data as the foundation, authentic human-driven creative over AI-generated spam, and strategic use of Meta's Advantage+ and Dynamic Creative tools for campaign optimization."},
  {cat: "Thailand Business", src: "Digital in Asia", title: "Thailand's Digital Economy Hits 5.6 Trillion THB — Social Commerce Leads Growth at 18.6%", url: "https://digitalinasia.com/thailand-digital-market-overview-2026/", summary: "Thailand's digital economy reached 5.6 trillion THB (4.2% YoY) with 94.7% internet penetration, as social commerce surged 18.6% YoY to $5.20B, e-commerce hit 1.1 trillion THB, and 69% of Thai consumers now shop on social platforms with Shopee and TikTok Shop leading the way."},
  {cat: "Thailand Business", src: "Forvis Mazars", title: "Thailand Abolishes 1,500-Baht Duty-Free Threshold — Import Duty Now Applies to All Online Purchases", url: "https://www.forvismazars.com/th/en/insights/doing-business-in-thailand/tax/thailand-e-commerce-import-duty-2026", summary: "Thailand abolished the 1,500-baht duty-free threshold for online imports effective January 1, 2026 — now taxing all purchases over 1 baht — expected to generate 3 billion baht annually and level the playing field for Thai SMEs against foreign e-commerce sellers."},
  {cat: "Thailand Business", src: "Bangkok Post", title: "E-Commerce Boom Fuels Impulse Buying as Thailand Enters 'Speed Economy' Era", url: "https://www.bangkokpost.com/business/general/3267563/ecommerce-boom-fuels-impulse-buying", summary: "Thailand is entering a 'speed economy' era with B2C e-commerce projected at 1.6 trillion baht in 2026 — transaction values dropped to 800-1,000 baht while frequency surged 25% YoY, driven by flash sales and fast delivery as micro-creators reshape the market."},
  {cat: "Marketing Tips", src: "Forbes Advisor", title: "Small Business Marketing in 2026: The Ultimate Guide to Digital Strategy", url: "https://www.forbes.com/advisor/business/small-business-marketing/", summary: "Forbes Advisor's 2026 guide recommends treating digital marketing as small experiments starting with 1-2 channels aligned with your audience — prioritizing audience understanding, brand story, and data-driven iteration before any paid ad spend for sustainable growth."},
  {cat: "Marketing Tips", src: "Nextiva", title: "29 Social Media Best Practices to Grow Faster in 2026", url: "https://www.nextiva.com/blog/social-media-best-practices.html", summary: "Nextiva's 2026 social media guide emphasizes posting with purpose, responding to customers within an hour, using social as a full-service customer experience channel, and balancing emerging trends with consistent brand guidelines to turn followers into loyal customers."}
];

function render() {
  const cats = [...new Set(articles.map(a => a.cat))];
  let html = '';
  cats.forEach(cat => {
    const [color, emoji] = categoryColors[cat] || ["#888", "📰"];
    html += `<div class="section-title">${cat}</div>`;
    articles.filter(a => a.cat === cat).forEach(a => {
      html += `<div class="news-item">
        <div class="news-thumb" style="background:${color}">${emoji}</div>
        <div class="news-body">
          <div class="source">${a.src}</div>
          <div class="title"><a href="${a.url}" target="_blank">${a.title}</a></div>
          <div class="summary">${a.summary}</div>
        </div>
      </div>`;
    });
  });
  document.getElementById('content').innerHTML = html;
}
render();
</script>
</body>
</html>
