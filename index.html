<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurarich Daily Brief</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #faf7f2;
    color: #1a1a1a;
    line-height: 1.6;
  }
  .top-bar {
    background: linear-gradient(135deg, #c78a5c, #a86445);
    color: white;
    padding: 6px 0;
    text-align: center;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .container { max-width: 680px; margin: 0 auto; padding: 0 20px; }
  header {
    text-align: center;
    padding: 36px 0 20px;
    border-bottom: 1px solid #e0d6c8;
  }
  header h1 {
    font-size: 22px;
    color: #a86445;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  header h1 span { color: #c78a5c; }
  header .date {
    font-size: 13px;
    color: #8a7a6a;
    margin-top: 4px;
  }
  .news-item {
    padding: 18px 0;
    border-bottom: 1px solid #ede6db;
  }
  .news-item:last-of-type { border-bottom: none; }
  .news-item .source {
    font-size: 10px;
    color: #c78a5c;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    font-weight: 600;
    margin-bottom: 2px;
  }
  .news-item .title {
    font-size: 16px;
    font-weight: 500;
    color: #1a1a1a;
    margin: 2px 0 4px;
    line-height: 1.4;
  }
  .news-item .title a {
    color: #1a1a1a;
    text-decoration: none;
  }
  .news-item .title a:hover { color: #a86445; }
  .news-item .summary {
    font-size: 13px;
    color: #5a4a3a;
    line-height: 1.5;
  }
  .section-title {
    font-size: 13px;
    color: #a86445;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-weight: 600;
    margin: 24px 0 4px;
    padding-top: 8px;
  }
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #8a7a6a;
  }
  .empty-state h2 { font-size: 20px; color: #a86445; margin-bottom: 8px; }
  .empty-state p { font-size: 14px; }
  footer {
    text-align: center;
    padding: 24px 0 36px;
    color: #b0a090;
    font-size: 11px;
    border-top: 1px solid #e0d6c8;
    margin-top: 8px;
  }
  footer a { color: #c78a5c; text-decoration: none; }
  .loading {
    text-align: center;
    padding: 60px 20px;
    color: #8a7a6a;
  }
  .loading .spinner {
    display: inline-block;
    width: 24px;
    height: 24px;
    border: 3px solid #ede6db;
    border-top-color: #c78a5c;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="top-bar">Aurarich Powder · SPF 50++ Daily Brief</div>
<div class="container">
  <header>
    <h1>Aurarich <span>Daily</span></h1>
    <div class="date" id="date"></div>
  </header>
  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
      <p>Loading today's brief...</p>
    </div>
  </div>
  <footer>
    Updated daily at 8:00 AM · <a href="https://facebook.com/aurarich" target="_blank">Aurarich Powder</a>
  </footer>
</div>
<script>
const today = new Date();
const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
document.getElementById('date').textContent = `${days[today.getDay()]}, ${months[today.getMonth()]} ${today.getDate()}, ${today.getFullYear()}`;

const articles = [
  {cat: "Cosmetics & Beauty", src: "Premium Beauty News", title: "Cosmoprof CBE ASEAN Returns to Bangkok for 5th Edition (June 24-26)", url: "https://www.premiumbeautynews.com/en/cosmoprof-cbe-asean-back-in,27686", summary: "The 5th Cosmoprof CBE ASEAN trade show opens at Queen Sirikit National Convention Center with a record 700 exhibitors across 33,000 sqm. Features include the new Cosmopack supply chain section and a live 'Sunscreen Factory' installation from formulation to packaging."},
  {cat: "Cosmetics & Beauty", src: "Premium Beauty News", title: "Thailand Beauty Market Expected to Grow at 5.45% CAGR to $7.87B by 2034", url: "https://www.premiumbeautynews.com/en/cosmoprof-cbe-asean-back-in,27686", summary: "Thailand's beauty and personal care market is projected to reach USD 7.87 billion by 2034, driven by OEM/ODM manufacturing strength in skincare and color cosmetics. Thailand ranks 17th globally in beauty product manufacturing."},
  {cat: "Cosmetics & Beauty", src: "WifiTalents", title: "Thailand Cosmetics Retail Sales Hit THB 242 Billion in 2024", url: "https://wifitalents.com/thailand-beauty-industry-statistics/", summary: "Thailand's beauty and personal care retail market reached THB 242.0 billion in 2024. The industry is seeing strong demand from both domestic consumption and export markets, with skincare leading growth."},
  {cat: "SPF & Sunscreen", src: "CNN", title: "FDA Approves First New Sunscreen Ingredient in 20 Years (Bemotrizinol)", url: "https://www.cnn.com/2026/06/09/health/new-sunscreen-bemotrizinol-wellness", summary: "The FDA approved Bemotrizinol (BEMT), a sunscreen filter used for decades in Europe and Asia. US sunscreens currently deliver only 24% of the UVA protection implied by SPF labels. BEMT closes this gap with better UVA protection and minimal skin absorption."},
  {cat: "SPF & Sunscreen", src: "EWG", title: "EWG's 20th Annual Sunscreen Guide Finds UVA Protection Gap Persists", url: "https://www.ewg.org/news-insights/news-release/2026/05/ewgs-20th-annual-guide-sunscreens-finds-market-progress", summary: "Out of 550 recommended sunscreens, 497 are mineral-based due to outdated approved chemical filters. EWG highlights the need for broader FDA approval of modern UV filters already used internationally."},
  {cat: "Facebook & Ads", src: "AdManage.ai", title: "Meta Ads March 2026: Attribution Overhaul, Threads Ads Go Live, New Fees Coming", url: "https://admanage.ai/blog/meta-ads-update", summary: "Meta reclassified click-through attribution to count only link clicks, introduced engage-through attribution, and lowered video view thresholds to 5 seconds. Threads ads are now operational globally and location fees of 2-5% begin July 1 for UK, France, Italy and other countries."},
  {cat: "Facebook & Ads", src: "Meta", title: "Facebook Advertising Policies Renamed to Meta Advertising Standards", url: "https://www.facebook.com/government-nonprofits/blog/facebook-advertising-policies-are-now-meta-advertising-standards", summary: "Meta is renaming its Advertising Policies to Meta Advertising Standards, with clearer rules and simplified language for advertisers. This is part of a broader policy modernization effort."},
  {cat: "Thailand & Marketing", src: "Elite Asia", title: "Digital & Social Media Trends in Thailand 2026: 51.5M Facebook Users", url: "https://www.eliteasia.co/digital-and-social-media-trends-in-thailand-in-2026/", summary: "Thailand has 67.8M internet users (94.7% penetration). Facebook leads at 51.5M users (87.9% of adults) followed by LINE at 56M MAUs. Digital ad spend reaches $6.6B, growing 11% annually. Short-form video and TikTok Shop are reshaping Thai e-commerce."},
  {cat: "Thailand & Marketing", src: "Hootsuite", title: "Social Media Trends 2026: AI Content and Micro-Community Building", url: "https://www.hootsuite.com/research/social-trends", summary: "Hootsuite's 2026 trends report highlights AI-generated content saturation, 'chaos culture' authenticity, and the rise of micro-communities over mass audiences. Brands are shifting from broad reach to deep engagement in niche spaces."},
  {cat: "Thailand & Marketing", src: "We Are Social", title: "Digital 2026 Mid-Year: 294 Million New Social Media Users Worldwide", url: "https://wearesocial.com/th/blog/2026/04/digital-2026-mid-year-global-update-report/", summary: "Social media user identities grew by 294 million over the past 12 months (5% annual growth). Thailand remains one of the most engaged markets globally with 2h 35m daily social media use per person."}
];

function render() {
  const cats = [...new Set(articles.map(a => a.cat))];
  let html = '';
  cats.forEach(cat => {
    html += `<div class="section-title">${cat}</div>`;
    articles.filter(a => a.cat === cat).forEach(a => {
      html += `<div class="news-item">
        <div class="source">${a.src}</div>
        <div class="title"><a href="${a.url}" target="_blank">${a.title}</a></div>
        <div class="summary">${a.summary}</div>
      </div>`;
    });
  });
  document.getElementById('content').innerHTML = html;
}
render();
</script>
</body>
</html>
