<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurarich Daily News</title>
<meta property="og:image" content="hero-thumb.png">
<meta property="og:title" content="Aurarich Daily News">
<meta property="og:description" content="Cosmetics, beauty, Facebook ads & Thailand business news — updated daily">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a0a2e url('bg.png') center/cover fixed no-repeat;
    color: #1a1a1a;
    line-height: 1.6;
    min-height: 100vh;
  }
  .top-bar {
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: white;
    padding: 8px 0;
    text-align: center;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .container {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 20px 40px;
  }
  .card {
    background: rgba(255,255,255,0.88);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 16px;
    padding: 20px 28px;
    margin-top: 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  }
  header {
    text-align: center;
    padding: 28px 0 16px;
    border-bottom: 1px solid rgba(0,0,0,0.08);
  }
  header h1 {
    font-size: 24px;
    background: linear-gradient(135deg, #f5a623, #e9407a, #7b2ff7);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  header h1 span { -webkit-text-fill-color: #7b2ff7; }
  header .date {
    font-size: 13px;
    color: #666;
    margin-top: 4px;
  }
  .news-item {
    padding: 16px 0;
    border-bottom: 1px solid rgba(0,0,0,0.06);
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }
  .news-item:last-of-type { border-bottom: none; }
  .news-thumb {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: #fff;
    margin-top: 2px;
  }
  .news-body { flex: 1; min-width: 0; }
  .news-item .source {
    font-size: 10px;
    color: #e9407a;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    font-weight: 600;
    margin-bottom: 2px;
  }
  .news-item .title {
    font-size: 16px;
    font-weight: 600;
    color: #1a1a1a;
    margin: 2px 0 4px;
    line-height: 1.4;
  }
  .news-item .title a {
    color: #1a1a1a;
    text-decoration: none;
  }
  .news-item .title a:hover { color: #7b2ff7; }
  .news-item .summary {
    font-size: 13px;
    color: #555;
    line-height: 1.5;
  }
  .section-title {
    font-size: 12px;
    color: #7b2ff7;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-weight: 700;
    margin: 20px 0 2px;
    padding-top: 4px;
  }
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #888;
  }
  .empty-state h2 { font-size: 20px; color: #555; margin-bottom: 8px; }
  .empty-state p { font-size: 14px; }
  footer {
    text-align: center;
    padding: 20px 0;
    color: #999;
    font-size: 11px;
    border-top: 1px solid rgba(0,0,0,0.06);
    margin-top: 4px;
  }
  .loading {
    text-align: center;
    padding: 60px 20px;
    color: #888;
  }
  .loading .spinner {
    display: inline-block;
    width: 24px;
    height: 24px;
    border: 3px solid #eee;
    border-top-color: #e9407a;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="top-bar">Aurarich Daily News · Cosmetic & Business Brief</div>
<div class="container">
  <div class="card">
  <header>
    <h1>Aurarich <span>News</span></h1>
    <div class="date" id="date"></div>
  </header>
  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
      <p>Loading today's brief...</p>
    </div>
  </div>
  <footer>
    Updated daily at 8:00 AM
  </footer>
  </div>
</div>
<script>
const today = new Date();
const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
document.getElementById('date').textContent = `${days[today.getDay()]}, ${months[today.getMonth()]} ${today.getDate()}, ${today.getFullYear()}`;

const categoryColors = {
  "Cosmetics & Beauty": ["#e9407a", "💄"],
  "Facebook & Ads": ["#1877F2", "📱"],
  "Thailand Business": ["#7b2ff7", "🇹🇭"],
  "Marketing Tips": ["#f5a623", "💡"]
};

const articles = [
  {cat: "Cosmetics & Beauty", src: "Asia News Network", title: "Thai sunscreen gets global attention after Kris Jenner's post", url: "https://asianews.network/thai-sunscreen-gets-global-attention-after-kris-jenners-post/", summary: "Kris Jenner's Instagram Story featuring a Thai sunscreen product went viral in May 2026, drawing fresh international attention to Thailand's fast-growing beauty industry — the second time a Thai beauty product has been spotted in her routine, fueling the rising \"T-Beauty\" global movement."},
  {cat: "Cosmetics & Beauty", src: "Hashtag Legend Thailand", title: "T-Beauty as the New Wave Trending in the Beauty World", url: "https://hashtaglegend.com/th/thai-beauty-on-the-rise-2026/", summary: "Thailand's beauty industry (T-Beauty) has carved a significant global presence alongside K-Beauty and J-Beauty, leveraging climate-specific formulations, accessible pricing, and viral Gen-Z marketing — with heritage brands like Srichand and Mistine joined by modern favorites like La Glace and 4U2."},
  {cat: "Cosmetics & Beauty", src: "BeautyMatter", title: "SPF Becomes Prestige Beauty's Fastest-Evolving Lifestyle Category in 2026", url: "https://beautymatter.com/articles/spf-trends-in-2026", summary: "SPF is transforming from a seasonal beach product into an everyday prestige beauty lifestyle category in 2026, with brands embedding sunscreen into cosmetics, lip care, and skincare hybrids at an average launch price of $30 — driven by hydrating, barrier-supporting, invisible-finish formulations."},
  {cat: "Facebook & Ads", src: "AdTaxi", title: "Meta's AI Advertising Plans: What To Expect in 2026 and How To Prepare", url: "https://www.adtaxi.com/blog/metas-ai-advertising-plans-what-to-expect-in-2026-and-how-to-prepare/", summary: "Meta plans to fully automate advertising by end of 2026 — from AI-generated creative (images, video, text) to targeting and budget recommendations — following a $14-15 billion Scale AI investment and 11 new AI ad tools introduced in 2025, giving smaller advertisers enterprise-level capabilities."},
  {cat: "Facebook & Ads", src: "JumpFly", title: "Threads Ads Go Global: What Meta Advertisers Need to Know", url: "https://www.jumpfly.com/blog/threads-ads-go-global-what-meta-advertisers-need-to-know/", summary: "Meta completed the global rollout of Threads ads in January 2026, reaching 137M+ daily active users with Image, Video, Carousel, and Advantage+ placements — offering advertisers a less saturated, lower-CPM alternative included automatically in Advantage+ campaigns."},
  {cat: "Facebook & Ads", src: "Stackmatix", title: "Meta Ads Policy 2026: The Essential Guide", url: "https://www.stackmatix.com/blog/meta-ads-policy", summary: "Meta's ad enforcement shifted to proactive AI risk assessment of operational behavior in 2026 — accounts can now be restricted based on spending patterns, scaling speed, device switching, and Business Manager associations, with health and beauty products facing 64% review rates."},
  {cat: "Thailand Business", src: "Digital in Asia", title: "Thailand's Digital Economy Hits 5.6 Trillion Baht — Social Commerce Leads Growth", url: "https://digitalinasia.com/thailand-digital-market-overview-2026/", summary: "Thailand's digital economy reached 5.6 trillion baht in 2026 with 94.7% internet penetration, as social commerce surged 18.6% YoY to $5.20B, e-commerce hit 1.1 trillion baht, and 69% of Thai consumers now shop on social platforms with Shopee and TikTok Shop leading."},
  {cat: "Thailand Business", src: "Forvis Mazars", title: "Thailand Abolishes 1,500-Baht Duty-Free Threshold — Import Duty Now Applies to All Online Purchases", url: "https://www.forvismazars.com/th/en/insights/doing-business-in-thailand/tax/thailand-e-commerce-import-duty-2026", summary: "Thailand abolished the 1,500-baht duty-free threshold for imported goods effective January 1, 2026 — now taxing all online purchases over 1 baht to generate 3 billion baht annually and level the playing field for Thai SMEs against foreign e-commerce sellers."},
  {cat: "Thailand Business", src: "Iconic Research", title: "Consumer Behavior in Thailand: 2026 Digital Trends & Market Research", url: "https://iconicthai.com/understanding-the-thai-consumer-insights-and-trends/", summary: "Thai consumer behavior in 2026 is defined by 91% of online shoppers purchasing via social platforms, a utilitarian-hedonic dual purchase mode among Gen Y, and the dominance of seamless mobile payments via PromptPay's 71 million daily transactions — requiring locally-calibrated research strategies."},
  {cat: "Marketing Tips", src: "Sprout Social", title: "Social Media Marketing for Small Business: Complete Guide for 2026", url: "https://sproutsocial.com/insights/social-media-marketing-for-small-business/", summary: "Sprout Social's 2026 guide for small businesses emphasizes treating social media as a connected growth engine — start with one 90-day goal, choose platforms based on how customers actually buy, and measure ROI including all costs such as creative time for sustainable results."},
  {cat: "Marketing Tips", src: "Mailchimp", title: "10 Strategies for 2026 Digital Marketing", url: "https://mailchimp.com/resources/digital-marketing-strategies/", summary: "Mailchimp's 2026 digital marketing strategies highlight nonlinear customer journeys, AI-powered personalization as a baseline expectation, community-driven marketing in micro-audiences, and predictive retention programs as acquisition costs continue climbing across all channels."}
];

function render() {
  const cats = [...new Set(articles.map(a => a.cat))];
  let html = '';
  cats.forEach(cat => {
    const [color, emoji] = categoryColors[cat] || ["#888", "📰"];
    html += `<div class="section-title">${cat}</div>`;
    articles.filter(a => a.cat === cat).forEach(a => {
      html += `<div class="news-item">
        <div class="news-thumb" style="background:${color}">${emoji}</div>
        <div class="news-body">
          <div class="source">${a.src}</div>
          <div class="title"><a href="${a.url}" target="_blank">${a.title}</a></div>
          <div class="summary">${a.summary}</div>
        </div>
      </div>`;
    });
  });
  document.getElementById('content').innerHTML = html;
}
render();
</script>
</body>
</html>
