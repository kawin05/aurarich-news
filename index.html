<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurarich Daily News</title>
<meta property="og:image" content="hero-thumb.png">
<meta property="og:title" content="Aurarich Daily News">
<meta property="og:description" content="Cosmetics, beauty, Facebook ads & Thailand business news — updated daily">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a0a2e url('bg.png') center/cover fixed no-repeat;
    color: #1a1a1a;
    line-height: 1.6;
    min-height: 100vh;
  }
  .top-bar {
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: white;
    padding: 8px 0;
    text-align: center;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .hero {
    width: 100%;
    max-width: 680px;
    margin: 20px auto 0;
    padding: 0 20px;
  }
  .hero img {
    width: 100%;
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    display: block;
  }
  .container {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 20px 40px;
  }
  .card {
    background: rgba(255,255,255,0.88);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 16px;
    padding: 20px 28px;
    margin-top: 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  }
  header {
    text-align: center;
    padding: 28px 0 16px;
    border-bottom: 1px solid rgba(0,0,0,0.08);
  }
  header h1 {
    font-size: 24px;
    background: linear-gradient(135deg, #f5a623, #e9407a, #7b2ff7);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  header h1 span { -webkit-text-fill-color: #7b2ff7; }
  header .date {
    font-size: 13px;
    color: #666;
    margin-top: 4px;
  }
  .news-item {
    padding: 16px 0;
    border-bottom: 1px solid rgba(0,0,0,0.06);
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }
  .news-item:last-of-type { border-bottom: none; }
  .news-thumb {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: #fff;
    margin-top: 2px;
  }
  .news-body { flex: 1; min-width: 0; }
  .news-item .source {
    font-size: 10px;
    color: #e9407a;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    font-weight: 600;
    margin-bottom: 2px;
  }
  .news-item .title {
    font-size: 16px;
    font-weight: 600;
    color: #1a1a1a;
    margin: 2px 0 4px;
    line-height: 1.4;
  }
  .news-item .title a {
    color: #1a1a1a;
    text-decoration: none;
  }
  .news-item .title a:hover { color: #7b2ff7; }
  .news-item .summary {
    font-size: 13px;
    color: #555;
    line-height: 1.5;
  }
  .section-title {
    font-size: 12px;
    color: #7b2ff7;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-weight: 700;
    margin: 20px 0 2px;
    padding-top: 4px;
  }
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #888;
  }
  .empty-state h2 { font-size: 20px; color: #555; margin-bottom: 8px; }
  .empty-state p { font-size: 14px; }
  footer {
    text-align: center;
    padding: 20px 0;
    color: #999;
    font-size: 11px;
    border-top: 1px solid rgba(0,0,0,0.06);
    margin-top: 4px;
  }
  .loading {
    text-align: center;
    padding: 60px 20px;
    color: #888;
  }
  .loading .spinner {
    display: inline-block;
    width: 24px;
    height: 24px;
    border: 3px solid #eee;
    border-top-color: #e9407a;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="top-bar">Aurarich Daily News · Cosmetic & Business Brief</div>
<div class="hero">
  <img src="hero-thumb.png" alt="Aurarich Daily News">
</div>
<div class="container">
  <div class="card">
  <header>
    <h1>Aurarich <span>News</span></h1>
    <div class="date" id="date"></div>
  </header>
  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
      <p>Loading today's brief...</p>
    </div>
  </div>
  <footer>
    Updated daily at 8:00 AM
  </footer>
  </div>
</div>
<script>
const today = new Date();
const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
document.getElementById('date').textContent = `${days[today.getDay()]}, ${months[today.getMonth()]} ${today.getDate()}, ${today.getFullYear()}`;

const categoryColors = {
  "Cosmetics & Beauty": ["#e9407a", "💄"],
  "Facebook & Ads": ["#1877F2", "📱"],
  "Thailand Business": ["#7b2ff7", "🇹🇭"],
  "Marketing Tips": ["#f5a623", "💡"]
};

const articles = [
  {cat: "Cosmetics & Beauty", src: "Global Cosmetics News", title: "FDA Approves First New Sunscreen Ingredient in 20 Years", url: "https://www.globalcosmeticsnews.com/global-cosmetics-news-weekly-review-week-24-june-2026/", summary: "The FDA has approved the first new sunscreen active ingredient in two decades, signaling a major shift in US sunscreen regulation. The move could open the door for more innovative UV filters in American sunscreen products."},
  {cat: "Cosmetics & Beauty", src: "Global Cosmetics News", title: "LANEIGE Opens AI-Powered Flagship Store for Personalized Beauty", url: "https://www.globalcosmeticsnews.com/global-cosmetics-news-weekly-review-week-24-june-2026/", summary: "LANEIGE launched a global flagship store focused entirely on AI-powered personalised beauty experiences, blending advanced skincare diagnostics with tailored product recommendations in an immersive retail environment."},
  {cat: "Cosmetics & Beauty", src: "Global Cosmetics News", title: "Henkel Invests €45M in European Supply Chain Expansion", url: "https://www.globalcosmeticsnews.com/global-cosmetics-news-weekly-review-week-24-june-2026/", summary: "Henkel invested €45 million in a new high-bay warehouse in Düsseldorf to strengthen its European supply chain for beauty care products, reflecting continued infrastructure investment in the cosmetics manufacturing sector."},
  {cat: "Cosmetics & Beauty", src: "Global Cosmetics News", title: "Indonesia Seizes 2 Million+ Illegal Cosmetic Products in Crackdown", url: "https://www.globalcosmeticsnews.com/global-cosmetics-news-weekly-review-week-24-june-2026/", summary: "Authorities in Indonesia seized more than 2 million illegal cosmetic products during a major crackdown on unregistered imports, highlighting growing regulatory enforcement across Southeast Asia's beauty market."},
  {cat: "Cosmetics & Beauty", src: "Global Cosmetics News", title: "EU Unveils Roadmap to Phase Out Animal Testing for Chemical Safety", url: "https://www.globalcosmeticsnews.com/global-cosmetics-news-weekly-review-week-24-june-2026/", summary: "The European Union unveiled a roadmap to phase out animal testing for chemical safety assessments, a move that could reshape cosmetics testing requirements across the EU market."},
  {cat: "Cosmetics & Beauty", src: "Cosmetics Business", title: "Cosmoprof CBE ASEAN 2026 Connects Global Beauty Players with ASEAN's Fast-Growing Market", url: "https://cosmeticsbusiness.com/cosmoprof-cbe-asean-2026-connects-global-beauty-players", summary: "The 5th edition of Cosmoprof CBE ASEAN returns to Bangkok June 24-26 with ~700 exhibitors and a new Cosmopack supply-chain pavilion, reflecting Thailand's cosmetics industry growth of 10-20% annually and its rising role as a global manufacturing hub."},
  {cat: "Cosmetics & Beauty", src: "CNN", title: "New Report Finds Few Sunscreens Meet Safety Standards", url: "https://www.cnn.com/2026/05/19/health/best-sunscreens-2026-wellness", summary: "EWG's 2026 sunscreen guide analyzing 2,784 products found only 550 (~20%) meet safety standards; oxybenzone use dropped to 5% and the FDA still has not finalized 2019 proposed regulations on chemical filters."},
  {cat: "Cosmetics & Beauty", src: "The Nation Thailand", title: "The T-Beauty Ascendance: Thailand's New Global Beauty Frontier", url: "https://www.nationthailand.com/business/40063109", summary: "Thailand's beauty industry, valued at over $8 billion and growing 10%+ annually, is gaining global recognition by blending traditional Thai heritage with scientific innovation — brands like Mistine have become China's #1 sunscreen."},
  {cat: "Facebook & Ads", src: "SocialBee", title: "Meta Rolls Out AI Business Agents for Messenger, WhatsApp & Instagram", url: "https://socialbee.com/blog/facebook-updates/", summary: "Meta launched AI-powered business agents that can answer questions, qualify leads, and book appointments across Messenger, WhatsApp, and Instagram — with built-in integrations for Shopify and Zendesk. Available globally from June 2026."},
  {cat: "Facebook & Ads", src: "SocialBee", title: "Threads Ads Now Available Globally — New Ad Revenue Stream for Meta", url: "https://socialbee.com/blog/facebook-updates/", summary: "Meta rolled out advertising on Threads to all users worldwide. Formats include Carousel, Video, Advantage+ Catalog, and Advantage+ App ads, opening a new channel for advertisers."},
  {cat: "Facebook & Ads", src: "SocialBee", title: "Meta Renames 'Engagement' to 'Interactions' — Changes How Clicks Are Counted", url: "https://socialbee.com/blog/facebook-updates/", summary: "Meta renamed the 'Engagement' metric to 'Interactions' and now excludes clicks from the count. Click-through attribution counts only real link clicks, while other interactions are tracked separately as 'Engage-through attribution.'"},
  {cat: "Facebook & Ads", src: "SocialBee", title: "Meta Testing Premium Subscriptions with Anonymous Story Viewing & Manus AI", url: "https://socialbee.com/blog/facebook-updates/", summary: "Meta is testing premium subscriptions for Facebook, Instagram, and WhatsApp offering exclusive features like anonymous story viewing, who viewed your story, and access to Manus AI assistant."},
  {cat: "Facebook & Ads", src: "AdManage.ai", title: "Meta Ads Updates: What Changed This Month (2026)", url: "https://admanage.ai/blog/meta-ads-update", summary: "Meta's updates include major attribution reclassification, removal of flexible format in Ads Manager, and location fees of 2-5% starting July 1 for several European countries. Nielsen DMA targeting ends June 22."},
  {cat: "Facebook & Ads", src: "Dataslayer.ai", title: "Meta Plans Full AI Advertising Automation by 2026", url: "https://www.dataslayer.ai/blog/meta-plans-full-ai-advertising-automation-by-2026-what-this-actually-means", summary: "Meta will fully automate ad creation by Q4 2026 — advertisers submit only a URL and budget while AI handles creative, targeting, and optimization, building on Advantage+'s $4.52 ROAS (22% better than manual campaigns)."},
  {cat: "Facebook & Ads", src: "Payments Dive", title: "Meta Revamps Ad Payment Policy", url: "https://www.paymentsdive.com/news/meta-revamps-ad-payment-policy/814295/", summary: "Meta is requiring some advertisers to switch from credit cards to monthly invoicing or direct bank debits starting April 1, 2026 — a move analysts tie to reducing the ~$16 billion in fraudulent ad revenue."},
  {cat: "Thailand Business", src: "Digital in Asia", title: "Thailand's Digital Economy Hits 5.6 Trillion THB in 2026", url: "https://digitalinasia.com/thailand-digital-market-overview-2026/", summary: "Thailand's digital economy reached 5.6 trillion THB, second-largest in Southeast Asia. 94.7% internet penetration (67.8M users), 59M smartphones, and enterprise digital transformation accelerating from $10.06B to $16.64B by 2031."},
  {cat: "Thailand Business", src: "Digital in Asia", title: "Social Commerce Booms: 69% of Thai Consumers Shop on Social Platforms", url: "https://digitalinasia.com/thailand-digital-market-overview-2026/", summary: "Social commerce is the fastest-growing segment at 18.6% YoY ($5.20B in 2025). Live shopping converts at 7.4% (vs 2-3% for Stories). 850,000 video sellers active — up 175% YoY. Shopee leads at 75% usage."},
  {cat: "Thailand Business", src: "Digital in Asia", title: "76% of Thais Interact with AI Daily — But Only 18% of Businesses Adopt It", url: "https://digitalinasia.com/thailand-digital-market-overview-2026/", summary: "Thailand's AI market is projected at 130B THB by 2030 (CAGR 18%). While 76% of consumers use AI daily, only 18% of businesses have integrated AI. The talent gap stands at 100K professionals needed vs 21K available."},
  {cat: "Thailand Business", src: "The Nation Thailand", title: "Thailand's Digital Economy Projected to Grow 4.2% in 2026 — Double GDP Growth", url: "https://www.facebook.com/TheNationThailand/posts/thailands-digital-economy-is-projected-to-grow-42-in-2026-double-national-gdp-gr/1253200433499955/", summary: "Thailand's digital economy is projected to grow 4.2% in 2026 — double national GDP growth — driven by tech investment, AI adoption, and data center expansion. ASEAN also finalizes DEFA to build a US$2 trillion digital economy by 2030."},
  {cat: "Thailand Business", src: "Enersys Insights", title: "Thailand's Digital Economy 2026 — Real Numbers, Real Policies, Real Opportunities", url: "https://enersys.co.th/en/insights/thailand-digital-economy-trends-2026", summary: "Thailand's digital economy hit $56 billion GMV in 2025 (+16% YoY), e-commerce surged 22% YoY (fastest in ASEAN), and video commerce sellers exploded 175% to 850,000 — with the government offering 200% tax deductions on digital expenses through 2027."},
  {cat: "Thailand Business", src: "IconicThai", title: "Consumer Behavior in Thailand 2026: Digital Trends & Market Research", url: "https://iconicthai.com/understanding-the-thai-consumer-insights-and-trends/", summary: "Thai consumer behavior in 2026 is shaped by deep digital penetration (91% internet users), generational shifts, and economic pressure — with ~91% of online shoppers purchasing via social platforms and PromptPay processing 71 million daily transactions."},
  {cat: "Thailand Business", src: "Krungsri Research", title: "Industry Outlook 2026-2028: Modern Trade (Thailand)", url: "https://www.krungsri.com/en/research/industry/industry-outlook/wholesale-retail/modern-trade/io/modern-trade-2026", summary: "Thailand's modern trade sector faces headwinds from a slowing economy and 86.8% household debt, but e-commerce has reached 23.5% of all retail sales — with health & beauty among the fastest-growing online categories at 35.5% CAGR."},
  {cat: "Marketing Tips", src: "Forbes Advisor", title: "Small Business Marketing In 2026: The Ultimate Guide", url: "https://www.forbes.com/advisor/business/small-business-marketing/", summary: "Forbes Advisor's 2026 guide recommends small businesses treat digital marketing as a series of small experiments, start with 1-2 channels aligned with their audience, and prioritize understanding their ideal customer before investing in any paid ads."},
  {cat: "Marketing Tips", src: "Nextiva", title: "29 Social Media Best Practices to Grow Faster in 2026", url: "https://www.nextiva.com/blog/social-media-best-practices.html", summary: "Nextiva's 2026 guide stresses that growth comes from posting with purpose — not posting more — and recommends using social media as a full-service customer experience channel, responding within an hour, and balancing trends with consistent brand guidelines."},
  {cat: "Marketing Tips", src: "WordStream", title: "Top Facebook Ads Trends for 2026 — New Targeting, Creatives & Automation", url: "https://www.wordstream.com/blog/2026-facebook-ads-trends", summary: "WordStream's 2026 Facebook Ads trends report covers AI-driven creative optimization, the shift to Advantage+ automation, and new audience targeting strategies that prioritize first-party data as third-party cookies continue to phase out."}
];

function render() {
  const cats = [...new Set(articles.map(a => a.cat))];
  let html = '';
  cats.forEach(cat => {
    const [color, emoji] = categoryColors[cat] || ["#888", "📰"];
    html += `<div class="section-title">${cat}</div>`;
    articles.filter(a => a.cat === cat).forEach(a => {
      html += `<div class="news-item">
        <div class="news-thumb" style="background:${color}">${emoji}</div>
        <div class="news-body">
          <div class="source">${a.src}</div>
          <div class="title"><a href="${a.url}" target="_blank">${a.title}</a></div>
          <div class="summary">${a.summary}</div>
        </div>
      </div>`;
    });
  });
  document.getElementById('content').innerHTML = html;
}
render();
</script>
</body>
</html>
